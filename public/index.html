<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Velib</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f172a;
  --panel:#111827;
  --panel2:#1f2937;
  --accent:#22c55e;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --border:rgba(255,255,255,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;}

.topbar{height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--panel);border-bottom:1px solid var(--border);gap:12px;}
.chip-group{display:flex;gap:8px;align-items:center;}
.chip{padding:6px 12px;border-radius:20px;background:var(--panel2);border:1px solid var(--border);cursor:pointer;font-size:.75rem;color:var(--muted);transition:all .2s;}
.chip.active{background:var(--accent);color:black;border-color:var(--accent);}
.search{background:var(--panel2);border:1px solid var(--border);padding:8px 12px;border-radius:8px;color:white;font-size:.85rem;outline:none;}
.search:focus{border-color:var(--accent);}
#headerCount{font-size:.75rem;color:var(--muted);white-space:nowrap;}

.layout{flex:1;display:grid;grid-template-columns:380px 1fr;overflow:hidden;}
.list{border-right:1px solid var(--border);overflow-y:auto;background:var(--panel);}
.station-item{padding:14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.station-item:hover{background:var(--panel2);}
.station-item.active{background:#1f2937;border-left:3px solid var(--accent);}
.st-name{font-weight:600;font-size:.9rem;}
.st-meta{font-size:.7rem;color:var(--muted);margin-top:4px;}
.st-badge{display:inline-block;padding:2px 6px;border-radius:10px;font-size:.65rem;margin-top:4px;}
.badge-open{background:rgba(34,197,94,.15);color:var(--accent);}
.badge-closed{background:rgba(239,68,68,.15);color:#f87171;}

.detail{padding:30px;overflow-y:auto;}
.detail-title{font-size:1.8rem;font-weight:800;margin-bottom:8px;}
.detail-sub{color:var(--muted);font-size:.85rem;margin-bottom:24px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.card{background:var(--panel);padding:20px;border-radius:10px;border:1px solid var(--border);}
.card-label{font-size:.75rem;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
.value{font-size:2rem;font-weight:800;color:var(--accent);}
.value.warn{color:#f59e0b;}
.value.danger{color:#f87171;}
.loading{padding:30px;text-align:center;color:var(--muted);}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:.9rem;}
</style>
</head>
<body>

<div class="topbar">
  <div class="chip-group" id="deptChips">
    <span class="chip active" data-dept="">Toutes</span>
    <span class="chip" data-dept="75">Paris</span>
    <span class="chip" data-dept="92">92</span>
    <span class="chip" data-dept="93">93</span>
    <span class="chip" data-dept="94">94</span>
  </div>
  <input id="searchInput" class="search" placeholder="Rechercher une station..." />
  <div id="headerCount"></div>
</div>

<div class="layout">
  <div class="list" id="stationList">
    <div class="loading">Chargement...</div> // message de chargement de l'initialisation
  </div>
  <div class="detail" id="main">
    <div class="loading">Sélectionnez une station</div> // message de stationnement de stationnement
  </div>
</div>

<!-- ✅ Chemin plat : tous les JS sont dans le même dossier public/ -->
<script type="module" src="./app.js"></script>
</body>
</html>
